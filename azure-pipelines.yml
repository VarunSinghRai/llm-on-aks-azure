# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - main
  paths:
    include: [terraform/**]

pool:
  vmImage: ubuntu-latest

variables:
- group: terraform-prod

stages:
  - stage: Plan
    jobs:
      - job: TerraformPlan
        steps:
          - task: TerraformInstaller@0
            inputs:
              terraformVersion: '1.7.5'

          - script: terraform fmt -check -recursive
            displayName: 'Terraform Format Check'
            workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'

          - task: TerraformTaskV4@4
            inputs:
              command: 'init'
              provider: azurerm
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              backendAzureRmResourceGroupName: $(TF_STATE_RG)
              backendAzureRmStorageAccountName: $(TF_STATE_SA)
              backendAzureRmContainerName: $(TF_STATE_CONTAINER_NAME)
              backendAzureRmKey: "dev.terraform.tfstate"
              backendServiceArm: "terraform-storage-backend"

          - task: TerraformTaskV4@4
            inputs:
              provider: azurerm
              command: 'plan'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              commandOptions: '-var-file=prod/prod.tfvars -out=tfplan -input=false'
              environmentServiceNameAzureRM: "terraform-storage-backend"
              
          - publish: terraform/tfplan
            artifact: tfplan
            


      


